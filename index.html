<html lang="vi"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE EDITION</title>
    <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0408;
            color: #f3f4f6;
            min-height: 100vh;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 20% 20%, rgba(239,68,68,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(251,146,60,0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(220,38,38,0.06) 0%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0px, transparent 1px, transparent 20px, rgba(255,255,255,0.02) 21px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.01) 0px, transparent 1px, transparent 20px, rgba(255,255,255,0.02) 21px);
            z-index: -1; pointer-events: none;
        }
        .premium-card {
            background: rgba(20,10,14,0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(239,68,68,0.12); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9), inset 0 1px 0 rgba(239,68,68,0.08);
        }
        .glass-input {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(239,68,68,0.15);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(20,10,14,0.9); border-color: rgba(239,68,68,0.7);
            box-shadow: 0 0 20px rgba(239,68,68,0.2), inset 0 2px 4px rgba(0,0,0,0.3);
        }
        #aimModal {
            position: fixed; inset: 0; z-index: 120; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
            opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #aimModal.active { opacity: 1; visibility: visible; }
        #aimModal .modal-content {
            transform: scale(0.95) translateY(10px); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            background: linear-gradient(145deg, rgba(30,15,18,0.95), rgba(20,10,14,0.98));
            border: 1px solid rgba(239,68,68,0.2); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.95);
        }
        #aimModal.active .modal-content { transform: scale(1) translateY(0); }
        #toast {
            position: fixed; top: 24px; left: 50%; transform: translate(-50%, -20px); opacity: 0; visibility: hidden;
            z-index: 110; width: 90%; max-width: 400px; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        #toast.show { transform: translate(-50%, 0); opacity: 1; visibility: visible; }
        #toastContent {
            padding: 1rem 1.25rem; border-radius: 16px; background: rgba(20,10,14,0.95);
            backdrop-filter: blur(10px); border: 1px solid rgba(239,68,68,0.25); color: #f4f4f5;
            font-size: 13px; line-height: 1.6; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.7);
        }
        .switch { position: relative; display: inline-block; width: 52px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.08); transition: 0.4s; border-radius: 34px; border: 1px solid rgba(239,68,68,0.3);
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: 0.4s; border-radius: 50%;
        }
        input:checked + .slider {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            border-color: rgba(251,146,60,0.6); box-shadow: 0 0 18px rgba(251,146,60,0.5);
        }
        input:checked + .slider:before { transform: translateX(24px); }
        @keyframes dynamicGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(239,68,68,0.4); }
            50% { text-shadow: 0 0 28px rgba(251,146,60,0.8), 0 0 10px rgba(239,68,68,0.6); }
        }
        .cyber-glow { animation: dynamicGlow 3s infinite ease-in-out; }
        @keyframes silverShine {
            0% { background-position: -200% center; } 100% { background-position: 200% center; }
        }
        .premium-shimmer {
            background: linear-gradient(90deg, #d4d4d8 25%, #fef08a 50%, #d4d4d8 75%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: silverShine 3s linear infinite;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-in { animation: fadeInScale 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }
        .btn-gradient-premium {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-gradient-premium:hover { background: linear-gradient(135deg, #b91c1c 0%, #ea580c 100%); }
        .btn-free-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-free-gradient:hover { background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%); }
        .btn-cert-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-cert-gradient:hover { background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        #countdownBox { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
        .countdown-warning { background: rgba(251,146,60,0.1) !important; border-color: rgba(251,146,60,0.4) !important; }
        .countdown-danger {
            background: rgba(239,68,68,0.1) !important; border-color: rgba(239,68,68,0.4) !important;
            animation: pulse-danger 1s infinite;
        }
        @keyframes pulse-danger { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .server-box { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.3); }
        .ip-badge {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(251,146,60,0.6); color: #fb923c;
            font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
            text-shadow: 0 0 8px rgba(251,146,60,0.8); font-family: monospace;
        }
        .accent-line {
            height: 1px; background: linear-gradient(90deg, transparent, rgba(239,68,68,0.4), transparent);
            width: 60%; margin: 0.5rem auto;
        }
    </style>

                        <a href="solitude.mobileconfig" class="py-3.5 rounded-2xl btn-cert-gradient text-white font-bold text-[11px] uppercase tracking-[0.1em] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-[0_8px_16px_-8px_rgba(37,99,235,0.5)] flex items-center justify-center gap-2 border border-blue-500/30">

    <div id="aimModal">
        <div class="modal-content w-full max-w-[320px] rounded-[22px] p-5 space-y-4">
            <div class="text-center">
                <div class="w-10 h-10 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center justify-center mx-auto mb-2">
                    <i class="fa-solid fa-crosshairs text-red-400 text-lg"></i>
                </div>
                <h3 class="text-[15px] font-black text-white tracking-wide">CHỌN AIM</h3>
            </div>
            <div class="space-y-3 bg-white/[0.03] border border-white/5 p-3 rounded-xl">
                <div class="grid grid-cols-1 gap-2" id="aimList"></div>
            </div>
            <button onclick="if (!window.__cfRLUnblockHandlers) return false; closeAimModal()" class="w-full py-3 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-400 border border-zinc-700 font-bold text-xs uppercase tracking-widest transition-colors">Đóng</button>
        </div>
    </div>

    <div id="toast"><div id="toastContent"></div></div>

    <script type="text/javascript">
        // ===== THÊM KEY VĨNH VIỄN =====
        const FREE_KEY = 'nminh-key-free';
        // ============================

        let clientIP = null;
        let ipFetchPromise = null;

        async function fetchRealIP() {
            try {
                const response = await fetch('https://api4.ipify.org?format=json');
                const data = await response.json();
                if (data && data.ip) {
                    clientIP = data.ip;
                    document.getElementById('clientIpDisplay').innerText = clientIP;
                } else {
                    document.getElementById('clientIpDisplay').innerText = 'Không xác định';
                }
            } catch(e) {
                document.getElementById('clientIpDisplay').innerText = 'Lỗi lấy IP';
            }
        }

        ipFetchPromise = fetchRealIP();

        // *** DANH SÁCH AIM MỚI CHO KEZMOD ***
        const aimList = [
            { file: 'ips_noantena_vip.txt', name: 'Aim No Antena', icon: 'fa-circle-xmark', color: 'orange' },
            { file: 'ips_antena_vip.txt', name: 'Neck Drag', icon: 'fa-gun', color: 'red' },
            { file: 'ips_chest_vip.txt', name: 'Aim Chest', icon: 'fa-shield-halved', color: 'yellow' },
            { file: 'ips_magic_bullet_vip.txt', name: 'Aim Body Noantena', icon: 'fa-wand-magic-sparkles', color: 'amber' }
        ];

        let currentActiveAim = null;
        let currentActiveFile = null;
        let currentKey = null;
        let isKeyChecked = false;
        let expiresAt = null;
        let countdownInterval = null;
        let statusCheckInterval = null;

        function renderAimList() {
            const container = document.getElementById('aimList');
            container.innerHTML = '';
            aimList.forEach(aim => {
                const isActive = (currentActiveFile === aim.file);
                const div = document.createElement('div');
                div.className = `aim-item flex items-center justify-between p-3 rounded-xl bg-black/40 border cursor-pointer transition-all ${
                    isActive
                        ? 'border-green-500/50 bg-green-500/10 text-white'
                        : 'border-white/5 text-gray-300 hover:border-red-500/40 hover:bg-white/5'
                }`;
                div.onclick = () => activateAim(aim.file, aim.name);
                div.innerHTML = `
                    <div class="flex items-center gap-2.5">
                        <i class="fa-solid ${aim.icon} text-${aim.color}-400/70 text-xs"></i>
                        <span class="text-[12px] font-bold">${aim.name}</span>
                        ${isActive ? '<span class="text-[8px] font-black px-1.5 py-0.5 rounded-md border border-green-500/40 bg-green-500/20 text-green-400 uppercase">ON</span>' : ''}
                    </div>
                    <i class="fa-solid ${isActive ? 'fa-check-circle text-green-400' : 'fa-chevron-right text-zinc-600'} text-xs"></i>
                `;
                container.appendChild(div);
            });
        }

        function saveState(key, aimName, fileName, expires) {
            localStorage.setItem('KEZMOD_aim_state', JSON.stringify({ key, aimName, fileName, expiresAt: expires, timestamp: Date.now() }));
        }

        function loadState() {
            const saved = localStorage.getItem('KEZMOD_aim_state');
            if (saved) try { return JSON.parse(saved); } catch(e) {}
            return null;
        }

        function clearState() {
            localStorage.removeItem('KEZMOD_aim_state');
            isKeyChecked = false; currentKey = null; expiresAt = null;
            stopCountdown(); stopStatusCheck();
        }

        function startCountdown(expiryTimestamp) {
            stopCountdown();
            expiresAt = expiryTimestamp;
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function stopCountdown() { if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; } }

        function updateCountdown() {
            const timerEl = document.getElementById('countdownTimer');
            const countdownBox = document.getElementById('countdownBox');
            if (!timerEl || !expiresAt) return;
            const remaining = expiresAt - Math.floor(Date.now()/1000);
            if (remaining <= 0) {
                timerEl.innerText = 'HẾT HẠN';
                countdownBox.className = 'flex items-center justify-between px-3 py-2 rounded-xl countdown-danger';
                handleExpired(); return;
            }
            const h = String(Math.floor(remaining/3600)).padStart(2,'0');
            const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
            const s = String(remaining%60).padStart(2,'0');
            timerEl.innerText = `${h}:${m}:${s}`;
            countdownBox.className = 'flex items-center justify-between px-3 py-2 rounded-xl' +
                (remaining < 600 ? ' countdown-danger' : remaining < 3600 ? ' countdown-warning' : '');
        }

        async function handleExpired() {
            stopCountdown(); stopStatusCheck();
            if (currentKey && currentKey !== FREE_KEY) {
                const fd = new FormData();
                fd.append('action', 'remove_ip');
                fd.append('key_code', currentKey);
                fd.append('aim_type', currentActiveAim || '');
                if (clientIP) fd.append('client_ip', clientIP);
                try {
                    await fetch(window.location.href, { method: 'POST', body: fd });
                } catch(e) {}
            }
            updateStatusUI(null, null);
            clearState();
            showToast("⏰ Key đã hết hạn! IP của bạn đã bị xoá khỏi hệ thống.", "#ef4444");
        }

        function startStatusCheck(key) {
            stopStatusCheck();
            // Với key free không cần kiểm tra server
            if (key === FREE_KEY) return;
            statusCheckInterval = setInterval(async () => {
                try {
                    const fd = new FormData(); fd.append('action','check_status'); fd.append('key_code',key);
                    fd.append('browser_uuid', document.getElementById('uuidField').value);
                    if (currentActiveFile) fd.append('file_name', currentActiveFile);
                    if (clientIP) fd.append('client_ip', clientIP);
                    const resp = await fetch(window.location.href, {method:'POST',body:fd});
                    const data = await resp.json();
                    if (data.expired || data.status==='error' || !data.active) {
                        handleExpired();
                    } else if (data.active && data.data) {
                        if (data.data.expires_at && data.data.expires_at !== expiresAt) {
                            startCountdown(data.data.expires_at);
                            saveState(key, data.data.aim, data.data.file, data.data.expires_at);
                        }
                        if (data.data.aim && data.data.file && (data.data.aim !== currentActiveAim || data.data.file !== currentActiveFile)) {
                            updateStatusUI(data.data.aim, data.data.file);
                        }
                    }
                } catch(e){}
            }, 30000);
        }

        function stopStatusCheck() { if (statusCheckInterval) { clearInterval(statusCheckInterval); statusCheckInterval = null; } }

        function updateStatusUI(aimName, fileName) {
            const statusBox = document.getElementById('statusBox');
            const statusAimName = document.getElementById('statusAimName');
            const toggleSwitch = document.getElementById('toggleSwitch');
            const serverBox = document.getElementById('serverBox');
            if (aimName && fileName) {
                statusBox.classList.remove('hidden'); serverBox.classList.remove('hidden');
                statusAimName.innerText = aimName; toggleSwitch.checked = true;
                currentActiveAim = aimName; currentActiveFile = fileName;
                document.getElementById('btnText').innerHTML = 'ĐỔI AIM KHÁC';
            } else {
                statusBox.classList.add('hidden'); serverBox.classList.add('hidden');
                statusAimName.innerText = '-'; toggleSwitch.checked = false;
                currentActiveAim = null; currentActiveFile = null;
                document.getElementById('btnText').innerHTML = 'Xác Nhận Tiến Hành';
                stopCountdown();
            }
            renderAimList();
        }

        async function handleInitialStep() {
            const keyInput = document.getElementById('keyInput');
            const key = keyInput.value.trim();
            if (!key) return showToast("Vui lòng nhập License Key!","#f87171");

            // Nếu là key free, xử lý bypass
            if (key === FREE_KEY) {
                isKeyChecked = true;
                currentKey = FREE_KEY;
                // Nếu đã có aim active trước đó thì giữ nguyên, nếu chưa mở modal chọn
                if (currentActiveAim) {
                    // Đã active rồi thì chỉ cần gia hạn countdown
                    const fakeExpiry = Math.floor(Date.now()/1000) + (10 * 365 * 24 * 3600); // 10 năm
                    startCountdown(fakeExpiry);
                    saveState(FREE_KEY, currentActiveAim, currentActiveFile, fakeExpiry);
                    showToast("✅ Key vĩnh viễn đã kích hoạt!","#22c55e");
                } else {
                    // Mở modal chọn aim
                    renderAimList();
                    document.getElementById('aimModal').classList.add('active');
                    showToast("✅ Key vĩnh viễn hợp lệ! Chọn AIM để kích hoạt.","#22c55e");
                }
                return;
            }

            // Luồng gốc cho key thường
            if (isKeyChecked && currentKey === key) {
                renderAimList();
                document.getElementById('aimModal').classList.add('active');
                return;
            }

            const btn = document.getElementById('btn-submit-main');
            const btnText = document.getElementById('btnText');
            btn.disabled = true; btnText.innerHTML = '<span class="spinner"></span> ĐANG KIỂM TRA...';
            showToast("⏳ Đang kiểm tra key...","#f97316");

            const fd = new FormData(); fd.append('action','check_key'); fd.append('key_code',key);
            fd.append('browser_uuid', document.getElementById('uuidField').value);
            if (clientIP) fd.append('client_ip', clientIP);

            try {
                const resp = await fetch(window.location.href, {method:'POST',body:fd});
                const data = await resp.json();
                if (data.status === 'success') {
                    isKeyChecked = true;
                    currentKey = key;
                    const exp = data.expires_at || null;

                    if (data.activated && data.activation_data) {
                        if (data.activation_data.aim) {
                            updateStatusUI(data.activation_data.aim, data.activation_data.file);
                            if (exp) { startCountdown(exp); startStatusCheck(key); }
                            saveState(key, data.activation_data.aim, data.activation_data.file, exp);
                            showToast("✅ Key đã kích hoạt, trạng thái đã được khôi phục.","#22c55e");
                        } else {
                            updateStatusUI(null, null);
                            saveState(key, null, null, exp);
                            showToast("✅ Key hợp lệ. Vui lòng chọn AIM để kích hoạt.","#22c55e");
                            renderAimList();
                            document.getElementById('aimModal').classList.add('active');
                        }
                    } else {
                        saveState(key, null, null, exp);
                        showToast("✅ Key hợp lệ! Chọn AIM để kích hoạt.","#22c55e");
                        renderAimList();
                        document.getElementById('aimModal').classList.add('active');
                    }
                } else {
                    isKeyChecked = false;
                    currentKey = null;
                    showToast("❌ " + (data.message || 'Key không tồn tại'),"#f87171");
                }
            } catch(e) {
                showToast("❌ Lỗi kết nối đến máy chủ","#f87171");
            }

            btn.disabled = false;
            btnText.innerHTML = currentActiveAim ? 'ĐỔI AIM KHÁC' : 'Xác Nhận Tiến Hành';
        }

        async function activateAim(fileName, aimName) {
            const key = currentKey || document.getElementById('keyInput').value.trim();
            if (!key) return showToast("Vui lòng nhập License Key!","#f87171");
            if (!isKeyChecked || currentKey !== key) return showToast("❌ Vui lòng kiểm tra key trước!","#f87171");
            if (!clientIP && key !== FREE_KEY) return showToast("❌ Chưa lấy được IP, thử lại sau.","#f87171");

            // Nếu key free, kích hoạt offline
            if (key === FREE_KEY) {
                updateStatusUI(aimName, fileName);
                const fakeExpiry = Math.floor(Date.now()/1000) + (10 * 365 * 24 * 3600);
                startCountdown(fakeExpiry);
                saveState(FREE_KEY, aimName, fileName, fakeExpiry);
                showToast("✅ Kích hoạt " + aimName + " thành công (Key vĩnh viễn)! Host: server.zenithsolitude.store:2088","#22c55e");
                closeAimModal();
                return;
            }

            // Luồng gốc
            showToast("⏳ Đang kích hoạt " + aimName + "...","#f97316");
            const fd = new FormData();
            fd.append('action','add_ip'); fd.append('key_code',key); fd.append('file_name',fileName);
            fd.append('aim_type',aimName); fd.append('browser_uuid',document.getElementById('uuidField').value);
            fd.append('client_ip', clientIP);
            try {
                const resp = await fetch(window.location.href, {method:'POST',body:fd});
                const data = await resp.json();
                if (data.status === 'success') {
                    updateStatusUI(aimName, fileName);
                    if (data.expires_at) {
                        startCountdown(data.expires_at);
                        saveState(key, aimName, fileName, data.expires_at);
                        startStatusCheck(key);
                    } else {
                        saveState(key, aimName, fileName, null);
                    }
                    showToast("✅ Kích hoạt " + aimName + " thành công! Host: server.zenithsolitude.store:2088","#22c55e");
                    closeAimModal();
                } else {
                    showToast("❌ " + (data.message || 'Lỗi khi kích hoạt'),"#f87171");
                }
            } catch(e) {
                showToast("❌ Lỗi kết nối","#f87171");
            }
        }

        async function toggleAim() {
            const toggleSwitch = document.getElementById('toggleSwitch');
            const key = currentKey || document.getElementById('keyInput').value.trim();
            if (!toggleSwitch.checked && currentActiveFile && currentActiveAim) {
                if (!clientIP && key !== FREE_KEY) return showToast("❌ Chưa lấy được IP.","#f87171");
                
                if (key === FREE_KEY) {
                    // Tắt aim offline
                    updateStatusUI(null, null);
                    clearState();
                    showToast("✅ Đã tắt và xoá IP (Key vĩnh viễn)","#22c55e");
                    return;
                }

                showToast("⏳ Đang tắt " + currentActiveAim + " và xoá IP khỏi tất cả file...","#f97316");
                const fd = new FormData();
                fd.append('action','remove_ip'); fd.append('key_code',key);
                fd.append('file_name',currentActiveFile); fd.append('aim_type',currentActiveAim);
                fd.append('browser_uuid',document.getElementById('uuidField').value);
                fd.append('client_ip', clientIP);
                try {
                    const resp = await fetch(window.location.href, {method:'POST',body:fd});
                    const data = await resp.json();
                    if (data.status === 'success') {
                        updateStatusUI(null, null);
                        clearState();
                        showToast("✅ Đã tắt và xoá IP khỏi tất cả file","#22c55e");
                    } else {
                        toggleSwitch.checked = true;
                        showToast("❌ " + (data.message || 'Lỗi khi tắt'),"#f87171");
                    }
                } catch(e) {
                    toggleSwitch.checked = true;
                    showToast("❌ Lỗi kết nối","#f87171");
                }
            }
        }

        async function initState() {
            await ipFetchPromise;
            const keyInput = document.getElementById('keyInput');
            const savedState = loadState();
            if (savedState && savedState.key) {
                keyInput.value = savedState.key;
                currentKey = savedState.key;

                // Nếu key free, khôi phục trạng thái offline
                if (savedState.key === FREE_KEY) {
                    isKeyChecked = true;
                    if (savedState.aimName && savedState.fileName) {
                        updateStatusUI(savedState.aimName, savedState.fileName);
                        if (savedState.expiresAt) {
                            startCountdown(savedState.expiresAt);
                        }
                    } else {
                        updateStatusUI(null, null);
                    }
                    renderAimList();
                    return;
                }

                // Luồng gốc cho key thường
                const fd = new FormData();
                fd.append('action', 'check_status');
                fd.append('key_code', savedState.key);
                fd.append('browser_uuid', document.getElementById('uuidField').value);
                if (savedState.fileName) fd.append('file_name', savedState.fileName);
                if (clientIP) fd.append('client_ip', clientIP);

                try {
                    const resp = await fetch(window.location.href, {method:'POST', body:fd});
                    const data = await resp.json();
                    if (data.status === 'success' && data.active) {
                        if (data.data) {
                            if (data.data.aim && data.data.file) {
                                updateStatusUI(data.data.aim, data.data.file);
                                if (data.data.expires_at) {
                                    startCountdown(data.data.expires_at);
                                    startStatusCheck(savedState.key);
                                    saveState(savedState.key, data.data.aim, data.data.file, data.data.expires_at);
                                }
                            } else {
                                updateStatusUI(null, null);
                                if (savedState.expiresAt) startCountdown(savedState.expiresAt);
                                showToast("✅ Key đã kích hoạt. Vui lòng chọn AIM.","#22c55e");
                            }
                        }
                        isKeyChecked = true;
                    } else if (data.expired || data.status === 'error' || !data.active) {
                        handleExpired();
                    }
                } catch(e) {
                    if (savedState.aimName && savedState.fileName) {
                        updateStatusUI(savedState.aimName, savedState.fileName);
                        if (savedState.expiresAt) {
                            startCountdown(savedState.expiresAt);
                            startStatusCheck(savedState.key);
                        }
                    }
                }
            }
            renderAimList();
        }

        setInterval(() => {
            const el = document.getElementById('realtime-ping');
            if(el) el.innerText = (Math.floor(Math.random()*(35-18+1))+18)+'ms';
        }, 3000);

        (async function initIdentification() {
            async function getDeviceVipID() {
                let webglInfo = "";
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) webglInfo = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)+"||"+gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    }
                } catch(e) {}
                const hardware = [navigator.hardwareConcurrency||'8', screen.colorDepth, webglInfo, navigator.platform, navigator.language, new Date().getTimezoneOffset(), navigator.userAgent.replace(/\d+/g,'')].join('||');
                let hash = 0;
                for(let i=0; i<hardware.length; i++) { hash = ((hash<<5)-hash)+hardware.charCodeAt(i); hash |= 0; }
                return { num: Math.abs(hash), str: 'VIP-'+Math.abs(hash).toString(16).toUpperCase() };
            }
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length===2) return parts.pop().split(';').shift();
                return null;
            }
            const fingerprint = await getDeviceVipID();
            const isValidUUID = (id) => id && !id.includes('DELTA-') && (id.match(/-/g)||[]).length >= 2;
            const urlParams = new URLSearchParams(window.location.search);
            const keyFromUrl = urlParams.get('key');
            if (keyFromUrl && document.getElementById('keyInput')) {
                document.getElementById('keyInput').value = keyFromUrl;
                currentKey = keyFromUrl;
            }
            let devID = urlParams.get('browser_uuid') || getCookie('browser_uuid') || localStorage.getItem('delta_device_uuid');
            if (!isValidUUID(devID)) {
                const timeSalt = Date.now().toString(16).toUpperCase();
                const cryptoBuffer = new Uint32Array(1); window.crypto.getRandomValues(cryptoBuffer);
                const randomSalt = cryptoBuffer[0].toString(16).toUpperCase().padStart(4,'0');
                devID = `${fingerprint.str}-${timeSalt}-${randomSalt}`;
            }
            localStorage.setItem('delta_device_uuid', devID);
            document.cookie = "browser_uuid="+devID+"; max-age="+(365*24*60*60)+"; path=/; SameSite=Lax";
            if(document.getElementById('uuidField')) document.getElementById('uuidField').value = devID;
            setTimeout(initState, 300);
        })();

        function closeAimModal() { document.getElementById('aimModal').classList.remove('active'); }

        function showToast(msg, color) {
            const t = document.getElementById('toast'), tc = document.getElementById('toastContent');
            if(!t||!tc) return;
            tc.innerText = msg; if(color) tc.style.borderColor = color;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 4000);
        }

        document.getElementById('keyInput').addEventListener('keydown', function(e) { if(e.key==='Enter'){ e.preventDefault(); handleInitialStep(); } });
    </script>
</body></html>
