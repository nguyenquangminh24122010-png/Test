<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nminh Lock Pro</title>
    <style>
        /* toàn bộ CSS giữ nguyên như bản cũ của bạn */
        :root { --cyan: #39e6e6; --text: #eaf2f2; --dim: #7e93a0; --danger: #ff5c5c; --gold: #ffd700; --vip: #ff9900; --green: #4dff91; --pb: rgba(57, 230, 230, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); background: #020408; overflow: hidden; }
        /* ... (giữ nguyên toàn bộ CSS) ... */
        .mu-err { font-size: 10px; color: var(--danger); text-align: center; margin-top: 4px; padding: 3px 8px; background: rgba(255,92,92,.08); border-radius: 6px; display: none; }
        /* Thêm style cho upload ảnh */
        .cover-upload-wrap { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .cover-upload-btn { padding: 6px 12px; background: rgba(57,230,230,.1); border: 1px solid var(--cyan); border-radius: 6px; color: var(--cyan); font-size: 12px; cursor: pointer; }
        .cover-upload-btn:hover { background: rgba(57,230,230,.2); }
        .cover-preview { width: 50px; height: 50px; border-radius: 8px; border: 1px solid var(--pb); object-fit: cover; display: none; }
    </style>
</head>
<body>
    <!-- canvas, nebula, stars... giữ nguyên -->
    <canvas id="galaxy"></canvas>
    <div class="neb n1"></div><div class="neb n2"></div><div class="neb n3"></div>
    <div class="ss" style="top:10%;left:20%;animation-duration:6s;"></div>
    <div class="ss" style="top:30%;left:60%;animation-duration:8s;animation-delay:2.5s;"></div>
    <div class="ss" style="top:60%;left:10%;animation-duration:7s;animation-delay:5s;"></div>
    <div class="ss" style="top:5%;left:80%;animation-duration:5s;animation-delay:1.5s;"></div>
    <div class="ss" style="top:80%;left:50%;animation-duration:9s;animation-delay:4s;"></div>
    <canvas id="snow"></canvas>
    <canvas id="petals"></canvas>

    <!-- INTRO -->
    <div id="intro">... (giữ nguyên) ...</div>

    <div id="app">
        <!-- PAGE 1,2,3,FULL,EXP,SENS giữ nguyên -->

        <!-- PAGE ADMIN -->
        <div id="pageAdmin" class="page" style="width:360px;">
            <div class="cb">👑</div>
            <div class="page-inner">
                <div class="brand">Quản trị viên</div>
                <h1 style="font-size:18px;">Admin Panel</h1>
                <div class="admhdr">🔑 Nminh Lock Pro — Toàn quyền quản lý</div>
                <div id="fbGuide" class="fb-notice" style="display:none;"></div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('tabKeys',this)">🗝 Keys</button>
                    <button class="tab" onclick="switchTab('tabMusic',this)">🎵 Nhạc</button>
                    <button class="tab" onclick="switchTab('tabApp',this)">⚙️ App</button>
                </div>
                <!-- TAB KEYS giữ nguyên -->
                <div id="tabKeys" class="tabp active">... </div>
                <!-- TAB MUSIC -->
                <div id="tabMusic" class="tabp">
                    <div class="admsec">
                        <div style="background:rgba(57,230,230,.06);...">...</div>
                        <div style="display:flex;gap:6px;margin-bottom:12px;">
                            <button id="mTabFile" onclick="switchMusicTab('file')" style="...">📁 Upload File</button>
                            <button id="mTabLink" onclick="switchMusicTab('link')" style="...">🔗 Dán Link</button>
                        </div>
                        <!-- Panel File (giữ nguyên) -->
                        <div id="mPanelFile">... </div>
                        <!-- Panel Link (đã sửa) -->
                        <div id="mPanelLink" style="display:none;">
                            <div class="admsec-t">Thêm bài hát (link nhạc bất kỳ)</div>
                            <div class="grid1"><div><div class="albl">Tên bài hát</div>
                                <input type="text" id="mTrackName" class="ainp" placeholder="vd: Tên bài hát"></div></div>
                            <div class="grid1"><div><div class="albl">Nghệ sĩ</div>
                                <input type="text" id="mArtist" class="ainp" placeholder="vd: Tên nghệ sĩ"></div></div>
                            <div class="grid1"><div><div class="albl">Link nhạc (mp3, Google Drive, Zingmp3...)</div>
                                <input type="text" id="mUrl" class="ainp" placeholder="https://..."></div></div>
                            <!-- THAY ĐỔI: Ảnh bìa có thể upload -->
                            <div class="grid1"><div class="albl">Ảnh bìa (tuỳ chọn)</div>
                                <input type="text" id="mCover" class="ainp" placeholder="Dán link hoặc chọn ảnh bên dưới">
                                <div class="cover-upload-wrap">
                                    <button type="button" class="cover-upload-btn" onclick="document.getElementById('mCoverFile').click()">📷 Chọn ảnh từ máy</button>
                                    <input type="file" id="mCoverFile" accept="image/*" style="display:none" onchange="handleCoverFileSelect(this)">
                                    <img id="mCoverPreview" class="cover-preview" src="" alt="Preview">
                                </div>
                                <div id="mCoverMsg" style="font-size:11px;color:var(--dim);margin-top:4px;"></div>
                            </div>
                            <div id="mMsg" class="ok" style="display:none;"></div>
                            <button class="btn" style="margin-top:4px;" onclick="adminAddTrack()">＋ Thêm Bài</button>
                        </div>
                    </div>
                    <div class="admsec">
                        <div class="admsec-t">Danh sách nhạc</div>
                        <div class="klist" id="adminTrackList"><div class="emp">Chưa có bài nào</div></div>
                    </div>
                </div>
                <!-- TAB APP giữ nguyên -->
                <div id="tabApp" class="tabp">... </div>
                <span class="back" onclick="goTo('page1')">← Thoát admin</span>
            </div>
        </div>
    </div>

    <script>
    /* ================================================================
       NMINH LOCK PRO - v2.7 (Thêm upload ảnh bìa Firebase Storage)
       ================================================================ */
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyAHqNEdDLet-ker_B7n4s5OhZnRyIv8SD8",
        authDomain: "aimhead-3548c.firebaseapp.com",
        databaseURL: "https://aimhead-3548c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "aimhead-3548c",
        storageBucket: "aimhead-3548c.firebasestorage.app",
        messagingSenderId: "205987052158",
        appId: "1:205987052158:web:cf3c908d43a29cdd05f62f",
    };

    const DEF_PW = "1";
    // ... (tất cả các hàm tiện ích: myUid, esc, pad, fmtMs, _lsGet/Set/Del, Firebase helpers giữ nguyên) ...

    // ----- THÊM STORAGE SDK VÀ HÀM UPLOAD -----
    let _storage = null;
    function loadStorage() {
        if (_storage) return Promise.resolve(_storage);
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js';
            script.onload = () => {
                try {
                    _storage = firebase.storage();
                    resolve(_storage);
                } catch(e) { reject(e); }
            };
            script.onerror = () => reject(new Error('Không tải được Firebase Storage SDK'));
            document.head.appendChild(script);
        });
    }

    async function uploadCoverImage(file) {
        await loadStorage();
        const uid = myUid();
        const timestamp = Date.now();
        const ext = file.name.split('.').pop().toLowerCase() || 'jpg';
        const path = `covers/${uid}_${timestamp}.${ext}`;
        const ref = _storage.ref(path);
        const uploadTask = ref.put(file);
        return new Promise((resolve, reject) => {
            uploadTask.on('state_changed', null, reject, async () => {
                const url = await ref.getDownloadURL();
                resolve(url);
            });
        });
    }

    // Biến tạm giữ ảnh được chọn
    let _pendingCoverFile = null;
    let _pendingCoverUrl = null; // từ ô input

    function handleCoverFileSelect(input) {
        const file = input.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert('Vui lòng chọn file ảnh!');
            return;
        }
        // Hiển thị preview
        const reader = new FileReader();
        reader.onload = (e) => {
            const preview = document.getElementById('mCoverPreview');
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
        _pendingCoverFile = file;
        document.getElementById('mCoverMsg').textContent = '✅ Ảnh sẽ được tải lên khi lưu bài.';
    }

    // ----- SỬA HÀM adminAddTrack ĐỂ HỖ TRỢ UPLOAD ẢNH -----
    async function adminAddTrack() {
        const name = document.getElementById('mTrackName').value.trim();
        const artist = document.getElementById('mArtist').value.trim();
        const url = document.getElementById('mUrl').value.trim();
        const coverLink = document.getElementById('mCover').value.trim();
        const msg = document.getElementById('mMsg');
        if (!name || !url) { showAdmMsg(msg,'❌ Nhập tên bài và link nhạc!',false); return; }

        let finalCover = coverLink; // ưu tiên link nhập tay nếu có
        if (_pendingCoverFile) {
            try {
                msg.textContent = '⏳ Đang tải ảnh bìa lên...'; msg.style.color = 'var(--cyan)'; msg.style.display = 'block';
                finalCover = await uploadCoverImage(_pendingCoverFile);
                document.getElementById('mCover').value = finalCover; // đồng bộ ô input
                document.getElementById('mCoverMsg').textContent = '✅ Ảnh bìa đã được tải lên.';
            } catch(e) {
                showAdmMsg(msg,'❌ Lỗi tải ảnh bìa: '+e.message, false);
                return;
            }
        }

        try {
            const tracks = await getTracks();
            tracks.push({ id:Date.now(), name, artist:artist||'Unknown', url, cover: finalCover, isLocal:false });
            await setTracks(tracks);
            showAdmMsg(msg,'✅ Đã thêm bài "'+name+'"!',true);
            // Reset form
            document.getElementById('mTrackName').value = '';
            document.getElementById('mArtist').value = '';
            document.getElementById('mUrl').value = '';
            document.getElementById('mCover').value = '';
            document.getElementById('mCoverPreview').style.display = 'none';
            document.getElementById('mCoverFile').value = '';
            _pendingCoverFile = null;
            loadAdminTrackList();
            initMusicPlayer();
        } catch(e) { showAdmMsg(msg,'❌ Lỗi: '+e.message,false); }
    }

    // ----- CÁC HÀM KHÁC (getTracks, setTracks, loadAdminTrackList, initMusicPlayer...) giữ nguyên hoàn toàn -----

    // ... phần còn lại của code (galaxy, snow, petals, toggle, openGame, sensitivity...) giữ nguyên ...

    // Khởi tạo
    updateSyncStatus(_FB_CONFIGURED);
    </script>
</body>
</html>
