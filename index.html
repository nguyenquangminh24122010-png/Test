<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLITUDE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0408;
            color: #f3f4f6;
            min-height: 100vh;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 20% 20%, rgba(239,68,68,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(251,146,60,0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(220,38,38,0.06) 0%, transparent 60%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0px, transparent 1px, transparent 20px, rgba(255,255,255,0.02) 21px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.01) 0px, transparent 1px, transparent 20px, rgba(255,255,255,0.02) 21px);
            z-index: -1; pointer-events: none;
        }
        .premium-card {
            background: rgba(20,10,14,0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(239,68,68,0.12); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9), inset 0 1px 0 rgba(239,68,68,0.08);
        }
        .glass-input {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(239,68,68,0.15);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(20,10,14,0.9); border-color: rgba(239,68,68,0.7);
            box-shadow: 0 0 20px rgba(239,68,68,0.2), inset 0 2px 4px rgba(0,0,0,0.3);
        }
        #aimModal {
            position: fixed; inset: 0; z-index: 120; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
            opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #aimModal.active { opacity: 1; visibility: visible; }
        #aimModal .modal-content {
            transform: scale(0.95) translateY(10px); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            background: linear-gradient(145deg, rgba(30,15,18,0.95), rgba(20,10,14,0.98));
            border: 1px solid rgba(239,68,68,0.2); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.95);
        }
        #aimModal.active .modal-content { transform: scale(1) translateY(0); }
        #toast {
            position: fixed; top: 24px; left: 50%; transform: translate(-50%, -20px); opacity: 0; visibility: hidden;
            z-index: 110; width: 90%; max-width: 400px; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        #toast.show { transform: translate(-50%, 0); opacity: 1; visibility: visible; }
        #toastContent {
            padding: 1rem 1.25rem; border-radius: 16px; background: rgba(20,10,14,0.95);
            backdrop-filter: blur(10px); border: 1px solid rgba(239,68,68,0.25); color: #f4f4f5;
            font-size: 13px; line-height: 1.6; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.7);
        }
        .switch { position: relative; display: inline-block; width: 52px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.08); transition: 0.4s; border-radius: 34px; border: 1px solid rgba(239,68,68,0.3);
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: 0.4s; border-radius: 50%;
        }
        input:checked + .slider {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            border-color: rgba(251,146,60,0.6); box-shadow: 0 0 18px rgba(251,146,60,0.5);
        }
        input:checked + .slider:before { transform: translateX(24px); }
        @keyframes dynamicGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(239,68,68,0.4); }
            50% { text-shadow: 0 0 28px rgba(251,146,60,0.8), 0 0 10px rgba(239,68,68,0.6); }
        }
        .cyber-glow { animation: dynamicGlow 3s infinite ease-in-out; }
        @keyframes silverShine {
            0% { background-position: -200% center; } 100% { background-position: 200% center; }
        }
        .premium-shimmer {
            background: linear-gradient(90deg, #d4d4d8 25%, #fef08a 50%, #d4d4d8 75%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: silverShine 3s linear infinite;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-in { animation: fadeInScale 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }
        .btn-gradient-premium {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-gradient-premium:hover { background: linear-gradient(135deg, #b91c1c 0%, #ea580c 100%); }
        .btn-free-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-free-gradient:hover { background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%); }
        .btn-cert-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-cert-gradient:hover { background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        #countdownBox { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
        .countdown-warning { background: rgba(251,146,60,0.1) !important; border-color: rgba(251,146,60,0.4) !important; }
        .countdown-danger {
            background: rgba(239,68,68,0.1) !important; border-color: rgba(239,68,68,0.4) !important;
            animation: pulse-danger 1s infinite;
        }
        @keyframes pulse-danger { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .server-box { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.3); }
        .ip-badge {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(251,146,60,0.6); color: #fb923c;
            font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
            text-shadow: 0 0 8px rgba(251,146,60,0.8); font-family: monospace;
        }
        .accent-line {
            height: 1px; background: linear-gradient(90deg, transparent, rgba(239,68,68,0.4), transparent);
            width: 60%; margin: 0.5rem auto;
        }
    </style>
</head>

        </div>

    <div id="toast"><div id="toastContent"></div></div>

    <script>
        // ============ BYPASS KEY "nminh-key-free" ============
        const FREE_KEY = 'nminh-key-free';
        let clientIP = '127.0.0.1'; // IP giả nếu chưa lấy được thật
        let currentActiveAim = null;
        let currentActiveFile = null;
        let currentKey = null;
        let isKeyChecked = false;
        let expiresAt = null;
        let countdownInterval = null;

        const aimList = [
            { file: 'ips_noantena_vip.txt', name: 'Aim No Antena', icon: 'fa-circle-xmark', color: 'orange' },
            { file: 'ips_antena_vip.txt', name: 'Neck Drag', icon: 'fa-gun', color: 'red' },
            { file: 'ips_chest_vip.txt', name: 'Aim Chest', icon: 'fa-shield-halved', color: 'yellow' },
            { file: 'ips_magic_bullet_vip.txt', name: 'Aim Magic Bullet', icon: 'fa-wand-magic-sparkles', color: 'amber' }
        ];

        // Lấy IP thật (không bắt buộc)
        fetch('https://api4.ipify.org?format=json')
            .then(r => r.json())
            .then(d => { if (d.ip) clientIP = d.ip; document.getElementById('clientIpDisplay').innerText = clientIP; })
            .catch(() => document.getElementById('clientIpDisplay').innerText = clientIP);

        function renderAimList() {
            const container = document.getElementById('aimList');
            container.innerHTML = '';
            aimList.forEach(aim => {
                const isActive = (currentActiveFile === aim.file);
                const div = document.createElement('div');
                div.className = `aim-item flex items-center justify-between p-3 rounded-xl bg-black/40 border cursor-pointer transition-all ${
                    isActive ? 'border-green-500/50 bg-green-500/10 text-white' : 'border-white/5 text-gray-300 hover:border-red-500/40 hover:bg-white/5'
                }`;
                div.onclick = () => activateAim(aim.file, aim.name);
                div.innerHTML = `
                    <div class="flex items-center gap-2.5">
                        <i class="fa-solid ${aim.icon} text-${aim.color}-400/70 text-xs"></i>
                        <span class="text-[12px] font-bold">${aim.name}</span>
                        ${isActive ? '<span class="text-[8px] font-black px-1.5 py-0.5 rounded-md border border-green-500/40 bg-green-500/20 text-green-400 uppercase">ON</span>' : ''}
                    </div>
                    <i class="fa-solid ${isActive ? 'fa-check-circle text-green-400' : 'fa-chevron-right text-zinc-600'} text-xs"></i>
                `;
                container.appendChild(div);
            });
        }

        function saveState(key, aimName, fileName, expires) {
            localStorage.setItem('KEZMOD_aim_state', JSON.stringify({ key, aimName, fileName, expiresAt: expires, timestamp: Date.now() }));
        }

        function loadState() {
            const saved = localStorage.getItem('KEZMOD_aim_state');
            if (saved) try { return JSON.parse(saved); } catch(e) {}
            return null;
        }

        function clearState() {
            localStorage.removeItem('KEZMOD_aim_state');
            isKeyChecked = false; currentKey = null; expiresAt = null;
            stopCountdown();
        }

        function startCountdown(expiryTimestamp) {
            stopCountdown();
            expiresAt = expiryTimestamp;
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function stopCountdown() { if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; } }

        function updateCountdown() {
            const timerEl = document.getElementById('countdownTimer');
            const countdownBox = document.getElementById('countdownBox');
            if (!timerEl || !expiresAt) return;
            const remaining = expiresAt - Math.floor(Date.now()/1000);
            if (remaining <= 0) {
                timerEl.innerText = 'HẾT HẠN';
                countdownBox.className = 'flex items-center justify-between px-3 py-2 rounded-xl countdown-danger';
                handleExpired(); return;
            }
            const h = String(Math.floor(remaining/3600)).padStart(2,'0');
            const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
            const s = String(remaining%60).padStart(2,'0');
            timerEl.innerText = `${h}:${m}:${s}`;
            countdownBox.className = 'flex items-center justify-between px-3 py-2 rounded-xl' +
                (remaining < 600 ? ' countdown-danger' : remaining < 3600 ? ' countdown-warning' : '');
        }

        function handleExpired() {
            stopCountdown();
            updateStatusUI(null, null);
            clearState();
            showToast("⏰ Key đã hết hạn!", "#ef4444");
        }

        function updateStatusUI(aimName, fileName) {
            const statusBox = document.getElementById('statusBox');
            const statusAimName = document.getElementById('statusAimName');
            const toggleSwitch = document.getElementById('toggleSwitch');
            const serverBox = document.getElementById('serverBox');
            if (aimName && fileName) {
                statusBox.classList.remove('hidden');
                serverBox.classList.remove('hidden');
                statusAimName.innerText = aimName;
                toggleSwitch.checked = true;
                currentActiveAim = aimName;
                currentActiveFile = fileName;
                document.getElementById('btnText').innerHTML = 'ĐỔI AIM KHÁC';
            } else {
                statusBox.classList.add('hidden');
                serverBox.classList.add('hidden');
                statusAimName.innerText = '-';
                toggleSwitch.checked = false;
                currentActiveAim = null;
                currentActiveFile = null;
                document.getElementById('btnText').innerHTML = 'Xác Nhận Tiến Hành';
                stopCountdown();
            }
            renderAimList();
        }

        function handleInitialStep() {
            const keyInput = document.getElementById('keyInput');
            const key = keyInput.value.trim();
            if (!key) return showToast("Vui lòng nhập License Key!", "#f87171");

            if (key === FREE_KEY) {
                // Bypass key miễn phí
                isKeyChecked = true;
                currentKey = key;
                const expiry = Math.floor(Date.now()/1000) + 315360000; // 10 năm
                if (!currentActiveAim) {
                    renderAimList();
                    document.getElementById('aimModal').classList.add('active');
                    showToast("✅ Key miễn phí! Chọn AIM để kích hoạt.", "#22c55e");
                } else {
                    startCountdown(expiry);
                    saveState(key, currentActiveAim, currentActiveFile, expiry);
                    showToast("✅ Key miễn phí đã kích hoạt!", "#22c55e");
                }
                return;
            }

            // Logic gốc cho key khác
            const btn = document.getElementById('btn-submit-main');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> ĐANG KIỂM TRA...';
            showToast("⏳ Đang kiểm tra key...", "#f97316");

            const fd = new FormData();
            fd.append('action', 'check_key');
            fd.append('key_code', key);
            fetch(window.location.href, { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        isKeyChecked = true;
                        currentKey = key;
                        if (data.activated && data.activation_data && data.activation_data.aim) {
                            updateStatusUI(data.activation_data.aim, data.activation_data.file);
                            if (data.expires_at) startCountdown(data.expires_at);
                            saveState(key, data.activation_data.aim, data.activation_data.file, data.expires_at || null);
                        } else {
                            renderAimList();
                            document.getElementById('aimModal').classList.add('active');
                        }
                    } else {
                        showToast("❌ " + (data.message || 'Key không hợp lệ'), "#f87171");
                    }
                })
                .catch(() => showToast("❌ Lỗi kết nối", "#f87171"))
                .finally(() => {
                    btn.disabled = false;
                    btnText.innerHTML = currentActiveAim ? 'ĐỔI AIM KHÁC' : 'Xác Nhận Tiến Hành';
                });
        }

        function activateAim(fileName, aimName) {
            const key = currentKey || document.getElementById('keyInput').value.trim();
            if (!key) return showToast("Vui lòng nhập License Key!", "#f87171");
            if (key === FREE_KEY) {
                // Kích hoạt trực tiếp
                updateStatusUI(aimName, fileName);
                const expiry = Math.floor(Date.now()/1000) + 315360000;
                startCountdown(expiry);
                saveState(key, aimName, fileName, expiry);
                showToast("✅ Kích hoạt " + aimName + " thành công!", "#22c55e");
                closeAimModal();
                return;
            }

            showToast("⏳ Đang kích hoạt...", "#f97316");
            const fd = new FormData();
            fd.append('action', 'add_ip');
            fd.append('key_code', key);
            fd.append('file_name', fileName);
            fd.append('aim_type', aimName);
            fd.append('client_ip', clientIP);
            fetch(window.location.href, { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        updateStatusUI(aimName, fileName);
                        if (data.expires_at) startCountdown(data.expires_at);
                        saveState(key, aimName, fileName, data.expires_at || null);
                        showToast("✅ Kích hoạt thành công!", "#22c55e");
                        closeAimModal();
                    } else {
                        showToast("❌ " + (data.message || 'Lỗi'), "#f87171");
                    }
                })
                .catch(() => showToast("❌ Lỗi kết nối", "#f87171"));
        }

        function toggleAim() {
            const toggleSwitch = document.getElementById('toggleSwitch');
            if (!toggleSwitch.checked && currentActiveFile) {
                if (currentKey === FREE_KEY) {
                    updateStatusUI(null, null);
                    clearState();
                    showToast("✅ Đã tắt", "#22c55e");
                    return;
                }
                // Gửi yêu cầu xóa IP đến server
                const fd = new FormData();
                fd.append('action', 'remove_ip');
                fd.append('key_code', currentKey);
                fd.append('file_name', currentActiveFile);
                fd.append('aim_type', currentActiveAim);
                fd.append('client_ip', clientIP);
                fetch(window.location.href, { method: 'POST', body: fd })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'success') {
                            updateStatusUI(null, null);
                            clearState();
                            showToast("✅ Đã tắt", "#22c55e");
                        } else {
                            toggleSwitch.checked = true;
                            showToast("❌ Lỗi", "#f87171");
                        }
                    })
                    .catch(() => {
                        toggleSwitch.checked = true;
                        showToast("❌ Lỗi kết nối", "#f87171");
                    });
            }
        }

        function closeAimModal() { document.getElementById('aimModal').classList.remove('active'); }

        function showToast(msg, color) {
            const t = document.getElementById('toast'), tc = document.getElementById('toastContent');
            if(!t||!tc) return;
            tc.innerText = msg;
            if(color) tc.style.borderColor = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        // Ping ảo
        setInterval(() => {
            const el = document.getElementById('realtime-ping');
            if(el) el.innerText = (Math.floor(Math.random()*(35-18+1))+18)+'ms';
        }, 3000);

        // Khởi tạo
        window.addEventListener('load', () => {
            const saved = loadState();
            if (saved && saved.key) {
                document.getElementById('keyInput').value = saved.key;
                currentKey = saved.key;
                if (saved.key === FREE_KEY) {
                    isKeyChecked = true;
                    if (saved.aimName && saved.fileName) {
                        updateStatusUI(saved.aimName, saved.fileName);
                        if (saved.expiresAt) startCountdown(saved.expiresAt);
                    }
                } else {
                    // Thử kiểm tra trạng thái với server
                    const fd = new FormData();
                    fd.append('action', 'check_status');
                    fd.append('key_code', saved.key);
                    fetch(window.location.href, { method: 'POST', body: fd })
                        .then(r => r.json())
                        .then(data => {
                            if (data.active && data.data) {
                                updateStatusUI(data.data.aim, data.data.file);
                                if (data.data.expires_at) startCountdown(data.data.expires_at);
                            }
                        }).catch(() => {});
                }
            }
            renderAimList();
        });

        document.getElementById('keyInput').addEventListener('keydown', function(e) {
            if(e.key==='Enter'){ e.preventDefault(); handleInitialStep(); }
        });
    </script>
</body>
</html>
